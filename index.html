<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Infographic Studio</title>
  <meta name="theme-color" content="#256f60" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Infographic Studio" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/controls.css" />
  <link rel="stylesheet" href="css/canvas.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-bar">
      <button class="icon-button ghost" id="newProjectBtn" title="New project">
        <span class="material-symbols-outlined">add</span>
      </button>
      <div class="brand-lockup">
        <div class="brand-icon"><span class="material-symbols-outlined">auto_awesome</span></div>
        <div>
          <h1>Infographic Studio</h1>
        </div>
      </div>
      <div class="app-actions">
        <button class="icon-button ghost" id="saveJsonBtn" title="Save project"><span class="material-symbols-outlined">download</span></button>
        <label class="icon-button ghost file-action" for="loadJsonInput" title="Load project"><span class="material-symbols-outlined">upload_file</span></label>
        <input id="loadJsonInput" type="file" accept="application/json" hidden>
        <button class="button primary compact" id="quickExportBtn" title="Export infographic"><span class="material-symbols-outlined">ios_share</span><span class="hide-xs">Export</span></button>
      </div>
    </header>

    <main class="editor-shell">
      <section class="stage-area" aria-label="Infographic canvas">
        <div class="stage-toolbar">
          <select id="canvasSizeSelect" aria-label="Canvas size">
            <option value="portrait">4:5</option>
            <option value="story">Story</option>
            <option value="square">Square</option>
            <option value="wide">Wide</option>
          </select>
          <div class="toolbar-group">
            <button class="chip-button pro-polish" id="polishBtn"><span class="material-symbols-outlined">auto_fix_high</span>Polish</button>
            <button class="chip-button" id="fitBtn"><span class="material-symbols-outlined">fit_screen</span>Fit</button>
          </div>
        </div>

        <div class="canvas-viewport" id="canvasViewport">
          <div class="canvas-holder" id="canvasHolder">
            <article class="infographic-canvas" id="infographicCanvas"></article>
          </div>
        </div>

        <div class="drag-guide guide-x" id="dragGuideX" aria-hidden="true"></div>
        <div class="drag-guide guide-y" id="dragGuideY" aria-hidden="true"></div>
        <div class="selection-toolbar hidden" id="selectionToolbar" aria-label="Selected block actions">
          <button data-action="duplicate" title="Duplicate"><span class="material-symbols-outlined">content_copy</span></button>
          <button data-action="back" title="Send back"><span class="material-symbols-outlined">flip_to_back</span></button>
          <button data-action="front" title="Bring front"><span class="material-symbols-outlined">flip_to_front</span></button>
          <button data-action="delete" title="Delete"><span class="material-symbols-outlined">delete</span></button>
        </div>
      </section>

      <aside class="mobile-dock" aria-label="Editor tools">
        <nav class="dock-tabs" id="dockTabs">
          <button data-panel="templates" class="active"><span class="material-symbols-outlined">dashboard</span><small>Design</small></button>
          <button data-panel="insert"><span class="material-symbols-outlined">add_box</span><small>Insert</small></button>
          <button data-panel="theme"><span class="material-symbols-outlined">palette</span><small>Brand</small></button>
          <button data-panel="edit"><span class="material-symbols-outlined">tune</span><small>Edit</small></button>
          <button data-panel="export"><span class="material-symbols-outlined">ios_share</span><small>Export</small></button>
        </nav>
        <div class="dock-panel" id="dockPanel"></div>
      </aside>
    </main>
  </div>

  <input id="logoUploadInput" type="file" accept="image/*" multiple hidden>
  <input id="photoUploadInput" type="file" accept="image/*" hidden>
  <div class="toast" id="toast" role="status"></div>
  <button class="preview-exit" id="exitPreviewBtn"><span class="material-symbols-outlined">close</span>Exit preview</button>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
